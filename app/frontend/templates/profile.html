<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой профиль - EskTech SSO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0A111F;
            color: #EFF3F8;
            padding: 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #3B82F6;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-links a {
            color: #EFF3F8;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .nav-links a:hover {
            background: rgba(59,130,246,0.2);
        }

        .logout-btn {
            background: rgba(239,68,68,0.2);
            color: #EF4444;
        }

        .logout-btn:hover {
            background: rgba(239,68,68,0.3);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #9CA3AF;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            border-radius: 8px 8px 0 0;
        }

        .tab-btn:hover {
            color: #EFF3F8;
            background: rgba(59,130,246,0.1);
        }

        .tab-btn.active {
            color: #3B82F6;
            border-bottom: 2px solid #3B82F6;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        /* Cards */
        .card {
            background: rgba(18,28,40,0.8);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(59,130,246,0.2);
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-header h3 {
            color: #3B82F6;
            font-size: 1.25rem;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #9CA3AF;
            font-size: 0.875rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: #0A111F;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #EFF3F8;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3B82F6;
        }

        .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Buttons */
        button {
            background: #3B82F6;
            color: #0A111F;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        button:hover {
            background: #2563EB;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: #EF4444;
            color: #FFFFFF;
        }

        .btn-danger:hover {
            background: #DC2626;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #EFF3F8;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        th {
            color: #3B82F6;
            font-weight: 600;
            font-size: 0.875rem;
        }

        td {
            font-size: 0.875rem;
        }

        /* Alerts */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease;
        }

        .alert-success {
            background: rgba(16,185,129,0.2);
            border: 1px solid #10B981;
            color: #10B981;
        }

        .alert-error {
            background: rgba(239,68,68,0.2);
            border: 1px solid #EF4444;
            color: #EF4444;
        }

        .alert-info {
            background: rgba(59,130,246,0.2);
            border: 1px solid #3B82F6;
            color: #3B82F6;
        }

        /* Info rows */
        .info-row {
            display: flex;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .info-label {
            width: 150px;
            color: #9CA3AF;
            font-weight: 500;
        }

        .info-value {
            flex: 1;
            color: #EFF3F8;
        }

        /* Loading */
        .loading {
            opacity: 0.6;
            cursor: wait;
            pointer-events: none;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .info-row {
                flex-direction: column;
            }
            
            .info-label {
                width: auto;
                margin-bottom: 0.25rem;
            }
            
            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">EskTech.<span>Личный кабинет</span></div>
            <div class="nav-links">
                <a href="/admin_clients.html" id="adminLink" style="display: none;">Админ панель</a>
                <a href="/" id="homeLink">Главная</a>
                <button id="logoutButton" class="logout-btn">Выйти</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="info">Личная информация</button>
            <button class="tab-btn" data-tab="security">Безопасность</button>
            <button class="tab-btn" data-tab="tokens">Мои токены</button>
        </div>

        <!-- Вкладка: Личная информация -->
        <div id="tab-info" class="tab-content active">
            <div class="card">
                <div class="card-header">
                    <h3>Личная информация</h3>
                    <button id="editProfileBtn" class="btn-secondary">Редактировать</button>
                </div>
                <div id="profileView">
                    <div class="info-row">
                        <div class="info-label">ID пользователя:</div>
                        <div class="info-value" id="userId">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Логин:</div>
                        <div class="info-value" id="username">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Email:</div>
                        <div class="info-value" id="email">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Полное имя:</div>
                        <div class="info-value" id="fullName">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Тип токенов:</div>
                        <div class="info-value" id="tokenType">-</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Дата регистрации:</div>
                        <div class="info-value" id="createdAt">-</div>
                    </div>
                </div>
                <div id="profileEdit" style="display: none;">
                    <form id="profileEditForm">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="editEmail" required disabled>
                        </div>
                        <div class="form-group">
                            <label>Полное имя</label>
                            <input type="text" id="editFullName">
                        </div>
                        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                            <button type="submit">Сохранить</button>
                            <button type="button" id="cancelEditBtn" class="btn-secondary">Отмена</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Вкладка: Безопасность -->
        <div id="tab-security" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h3>Смена пароля</h3>
                </div>
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label>Текущий пароль</label>
                        <input type="password" id="oldPassword" required autocomplete="current-password">
                    </div>
                    <div class="form-group">
                        <label>Новый пароль</label>
                        <input type="password" id="newPassword" required autocomplete="new-password">
                        <small style="color: #9CA3AF; display: block; margin-top: 0.25rem;">
                            Минимум 8 символов, включая буквы и цифры
                        </small>
                    </div>
                    <div class="form-group">
                        <label>Подтверждение нового пароля</label>
                        <input type="password" id="confirmPassword" required autocomplete="new-password">
                    </div>
                    <button type="submit">Сменить пароль</button>
                </form>
            </div>
        </div>

        <!-- Вкладка: Мои токены -->
        <div id="tab-tokens" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h3>Активные токены</h3>
                    <button id="revokeAllTokensBtn" class="btn-danger btn-sm">Отозвать все токены</button>
                </div>
                <div class="table-wrapper">
                    <table id="tokensTable">
                        <thead>
                            <tr>
                                <th>Тип</th>
                                <th>Client ID</th>
                                <th>Scope</th>
                                <th>Выдан</th>
                                <th>Истекает</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="tokensList">
                            <tr><td colspan="6" style="text-align: center;">Загрузка...</td</tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="messageContainer"></div>

    <script type="module" src="/frontend/static/js/profile.js"></script>
</body>
</html>
