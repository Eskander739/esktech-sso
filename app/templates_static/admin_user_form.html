<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% if user %}Редактировать{% else %}Создать{% endif %} пользователя</title>
    <style>
        body { font-family: system-ui; background: #0A111F; color: #EFF3F8; padding: 2rem; }
        .container { max-width: 500px; margin: 0 auto; background: rgba(18,28,40,0.9); padding: 2rem; border-radius: 24px; }
        label { display: block; margin-top: 1rem; }
        input, button { width: 100%; padding: 10px; margin-top: 0.5rem; border-radius: 8px; border: none; }
        button { background: #24B23E; color: #0A111F; font-weight: bold; cursor: pointer; margin-top: 1.5rem; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
<div class="container">
    <h2>{% if user %}Редактировать {{ user.username }}{% else %}Новый пользователь{% endif %}</h2>
    <form id="userForm">
        <label>Username</label>
        <input type="text" id="username" required value="{{ user.username if user else '' }}" {% if user %}readonly{% endif %}>
        <label>Email</label>
        <input type="email" id="email" required value="{{ user.email if user else '' }}">
        <label>Полное имя</label>
        <input type="text" id="full_name" value="{{ user.full_name if user else '' }}">
        <label>Пароль {% if user %}(оставьте пустым, чтобы не менять){% endif %}</label>
        <input type="password" id="password" {% if not user %}required{% endif %}>
        <label>
            <input type="checkbox" id="is_active" {% if not user or user.is_active %}checked{% endif %}> Активен
        </label>
        <button type="submit">{% if user %}Обновить{% else %}Создать{% endif %}</button>
    </form>
    <div id="message"></div>
</div>
<script>
    const form = document.getElementById('userForm');
    const userId = {{ user.id if user else 'null' }};
    form.onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            full_name: document.getElementById('full_name').value,
            password: document.getElementById('password').value,
            is_active: document.getElementById('is_active').checked
        };
        if (!userId && !payload.password) {
            alert('Пароль обязателен для нового пользователя');
            return;
        }
        const url = userId ? `/admin/users/${userId}` : '/admin/users';
        const method = userId ? 'PUT' : 'POST';
        // Для PUT не нужно передавать username (он только для POST), удалим username если редактирование
        if (userId) delete payload.username;
        const res = await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        if (res.ok) {
            window.location.href = '/admin/users/';
        } else {
            const err = await res.json();
            document.getElementById('message').innerText = 'Ошибка: ' + (err.detail || '');
        }
    };
</script>
</body>
</html>
