<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — EskTech SSO</title>
    <style>
        body { font-family: system-ui; background: #0A111F; color: #EFF3F8; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: rgba(18,28,40,0.9); padding: 2rem; border-radius: 24px; width: 320px; border: 1px solid rgba(36,178,62,0.3); }
        h1 { color: #24B23E; }
        input { width: 100%; padding: 10px; margin: 8px 0; background: #0A111F; border: 1px solid #2a3a4a; color: white; border-radius: 8px; }
        button { background: #24B23E; color: #0A111F; padding: 10px; width: 100%; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
<div class="card">
    <h1>Вход в систему</h1>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post">
        <input type="text" name="username" placeholder="Логин" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
    </form>
</div>
</body>
</html>
